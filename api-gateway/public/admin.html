<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Blog Microservicios</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100">
    <div id="nav-slot"></div>

    <main class="mx-auto max-w-6xl px-4 py-8">
      <h1 class="text-2xl font-bold text-slate-900">Panel de administracion</h1>
      <p class="mt-1 text-sm text-slate-600">Estadisticas basicas del sistema y gestion de usuarios.</p>

      <div id="page-message" class="mt-4 hidden"></div>

      <section class="mt-5 grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Usuarios</p>
          <p id="stat-total-users" class="mt-2 text-2xl font-bold text-slate-900">0</p>
        </article>
        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Posts</p>
          <p id="stat-total-posts" class="mt-2 text-2xl font-bold text-slate-900">0</p>
        </article>
        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Likes</p>
          <p id="stat-total-likes" class="mt-2 text-2xl font-bold text-slate-900">0</p>
        </article>
        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Comentarios</p>
          <p id="stat-total-comments" class="mt-2 text-2xl font-bold text-slate-900">0</p>
        </article>
      </section>

      <section class="mt-4 grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Admins</p>
          <p id="stat-admin-count" class="mt-2 text-lg font-bold text-slate-900">0</p>
        </article>
        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Authors</p>
          <p id="stat-author-count" class="mt-2 text-lg font-bold text-slate-900">0</p>
        </article>
        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Readers</p>
          <p id="stat-reader-count" class="mt-2 text-lg font-bold text-slate-900">0</p>
        </article>
        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Tags</p>
          <p id="stat-total-tags" class="mt-2 text-lg font-bold text-slate-900">0</p>
        </article>
      </section>

      <section class="mt-6 grid gap-4 lg:grid-cols-2">
        <article class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
          <h2 class="text-lg font-semibold text-slate-900">Top tags</h2>
          <ul id="top-tags-list" class="mt-3 space-y-2 text-sm text-slate-700"></ul>
        </article>
        <article class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
          <h2 class="text-lg font-semibold text-slate-900">Posts mas likeados</h2>
          <ul id="top-posts-list" class="mt-3 space-y-2 text-sm text-slate-700"></ul>
        </article>
      </section>

      <section class="mt-6 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
        <div class="border-b border-slate-200 px-4 py-3">
          <h2 class="text-lg font-semibold text-slate-900">Usuarios</h2>
        </div>
        <table class="min-w-full">
          <thead class="bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-600">
            <tr>
              <th class="px-4 py-3">ID</th>
              <th class="px-4 py-3">Nombre</th>
              <th class="px-4 py-3">Correo</th>
              <th class="px-4 py-3">Rol</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
