<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posts | Blog Microservicios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body class="app-shell">
    <div id="nav-slot"></div>

    <main class="page-wrap">
      <section class="hero">
        <p class="hero-kicker">Comunidad</p>
        <h1>Todos los posts</h1>
        <p>Usa el buscador, da like y abre cada card para leer el articulo completo.</p>
        <div class="hero-actions">
          <a id="my-posts-link" href="/my-posts.html" class="btn btn-dark hidden">Ir a mis posts</a>
          <a href="/profile.html" class="btn btn-secondary">Editar mi perfil</a>
        </div>
      </section>

      <div id="page-message" class="message-box hidden"></div>

      <section class="panel">
        <form id="filters-form" class="filters-layout">
          <div class="search-area">
            <label class="field-label" for="search-input">Buscar por titulo</label>
            <input
              id="search-input"
              name="q"
              class="input input-search"
              placeholder="Busca por tema, titulo o palabra clave"
            />
          </div>

          <div class="compact-filters">
            <div>
              <label class="field-label" for="tag-filter">Tag</label>
              <select id="tag-filter" class="select">
                <option value="">Todos</option>
              </select>
            </div>

            <div>
              <label class="field-label" for="limit-select">Resultados por pagina</label>
              <select id="limit-select" class="select">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="20">20</option>
              </select>
            </div>
          </div>

          <div class="filter-actions">
            <button class="btn btn-primary" type="submit">Aplicar filtros</button>
            <button id="clear-filters-btn" class="btn btn-ghost" type="button">Limpiar</button>
          </div>
        </form>
      </section>

      <section id="posts-list" class="posts-stack"></section>

      <footer class="pagination">
        <button id="prev-page" class="btn btn-ghost" type="button">Anterior</button>
        <p id="page-info">Pagina 1</p>
        <button id="next-page" class="btn btn-ghost" type="button">Siguiente</button>
      </footer>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/posts.js"></script>
  </body>
</html>
