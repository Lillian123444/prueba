version: "3.9"

services:
  users-db:
    image: postgres:16-alpine
    container_name: users-db
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: users
      POSTGRES_PASSWORD: userspass
    volumes:
      - users_data:/var/lib/postgresql/data
    networks:
      - backend

  posts-db:
    image: postgres:16-alpine
    container_name: posts-db
    environment:
      POSTGRES_DB: postsdb
      POSTGRES_USER: posts
      POSTGRES_PASSWORD: postspass
    volumes:
      - posts_data:/var/lib/postgresql/data
    networks:
      - backend

  comments-db:
    image: postgres:16-alpine
    container_name: comments-db
    environment:
      POSTGRES_DB: commentsdb
      POSTGRES_USER: comments
      POSTGRES_PASSWORD: commentspass
    volumes:
      - comments_data:/var/lib/postgresql/data
    networks:
      - backend

  users-service:
    build: ./services/users-service
    environment:
      PORT: 3002
      DATABASE_URL: postgres://users:userspass@users-db:5432/usersdb
    depends_on:
      - users-db
    networks:
      - backend

  auth-service:
    build: ./services/auth-service
    environment:
      PORT: 3001
      USERS_SERVICE_URL: http://users-service:3002
      JWT_SECRET: super-secret-change-me
      JWT_EXPIRES_IN: 24h
    depends_on:
      - users-service
    networks:
      - backend

  posts-service:
    build: ./services/posts-service
    environment:
      PORT: 3003
      DATABASE_URL: postgres://posts:postspass@posts-db:5432/postsdb
      USERS_SERVICE_URL: http://users-service:3002
    depends_on:
      - posts-db
      - users-service
    networks:
      - backend

  comments-service:
    build: ./services/comments-service
    environment:
      PORT: 3004
      DATABASE_URL: postgres://comments:commentspass@comments-db:5432/commentsdb
      USERS_SERVICE_URL: http://users-service:3002
      POSTS_SERVICE_URL: http://posts-service:3003
    depends_on:
      - comments-db
      - users-service
      - posts-service
    networks:
      - backend

  api-gateway:
    build: ./api-gateway
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      USERS_SERVICE_URL: http://users-service:3002
      POSTS_SERVICE_URL: http://posts-service:3003
      COMMENTS_SERVICE_URL: http://comments-service:3004
      JWT_SECRET: super-secret-change-me
    depends_on:
      - auth-service
      - users-service
      - posts-service
      - comments-service
    ports:
      - "3000:3000"
    networks:
      - backend

networks:
  backend:

volumes:
  users_data:
  posts_data:
  comments_data: