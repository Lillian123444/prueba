services:
  - type: web
    name: blog-api-gateway
    env: node
    rootDir: api-gateway
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: AUTH_SERVICE_URL
        value: https://blog-auth-service.onrender.com
      - key: USERS_SERVICE_URL
        value: https://blog-users-service.onrender.com
      - key: POSTS_SERVICE_URL
        value: https://blog-posts-service.onrender.com
      - key: COMMENTS_SERVICE_URL
        value: https://blog-comments-service.onrender.com
      - key: JWT_SECRET
        sync: false

  - type: web
    name: blog-auth-service
    env: node
    rootDir: services/auth-service
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: USERS_SERVICE_URL
        value: https://blog-users-service.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h

  - type: web
    name: blog-users-service
    env: node
    rootDir: services/users-service
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blog-users-db
          property: connectionString

  - type: web
    name: blog-posts-service
    env: node
    rootDir: services/posts-service
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blog-posts-db
          property: connectionString
      - key: USERS_SERVICE_URL
        value: https://blog-users-service.onrender.com

  - type: web
    name: blog-comments-service
    env: node
    rootDir: services/comments-service
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blog-comments-db
          property: connectionString
      - key: USERS_SERVICE_URL
        value: https://blog-users-service.onrender.com
      - key: POSTS_SERVICE_URL
        value: https://blog-posts-service.onrender.com

databases:
  - name: blog-users-db
    plan: free
  - name: blog-posts-db
    plan: free
  - name: blog-comments-db
    plan: free
